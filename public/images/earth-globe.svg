<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="earthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24c6dc;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sphereGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Base circle for Earth -->
  <circle cx="256" cy="256" r="250" fill="url(#earthGradient)" stroke="#ffffff" stroke-width="2" />
  
  <!-- Highlight effect -->
  <circle cx="256" cy="256" r="250" fill="url(#sphereGradient)" />
  
  <!-- Land masses (simplified continents) -->
  <path d="M180,70 Q210,80 240,75 Q270,70 300,85 Q330,100 350,120 Q370,140 380,170 Q390,200 380,230 Q370,260 350,280 Q330,300 300,310 Q270,320 240,315 Q210,310 180,290 Q150,270 130,240 Q110,210 105,180 Q100,150 110,120 Q120,90 150,80 Q170,75 180,70 Z" fill="#37A169" opacity="0.7" />
  
  <path d="M120,180 Q130,200 125,220 Q120,240 130,260 Q140,280 160,290 Q180,300 200,290 Q220,280 230,260 Q240,240 235,220 Q230,200 215,185 Q200,170 180,165 Q160,160 140,170 Q120,180 120,180 Z" fill="#37A169" opacity="0.7" />
  
  <path d="M300,200 Q310,220 305,240 Q300,260 310,280 Q320,300 340,310 Q360,320 380,310 Q400,300 410,280 Q420,260 415,240 Q410,220 395,205 Q380,190 360,185 Q340,180 320,190 Q300,200 300,200 Z" fill="#37A169" opacity="0.7" />
  
  <!-- Grid lines - latitudes -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <circle cx="256" cy="256" r="110" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <circle cx="256" cy="256" r="80" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  
  <!-- Grid lines - longitudes -->
  <line x1="256" y1="6" x2="256" y2="506" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <line x1="6" y1="256" x2="506" y2="256" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <line x1="76" y1="76" x2="436" y2="436" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  <line x1="76" y1="436" x2="436" y2="76" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  
  <!-- Highlight dots for tech cities -->
  <circle cx="180" cy="120" r="4" fill="#ffffff" />
  <circle cx="330" cy="180" r="4" fill="#ffffff" />
  <circle cx="220" cy="280" r="4" fill="#ffffff" />
  <circle cx="380" cy="250" r="4" fill="#ffffff" />
  <circle cx="160" cy="200" r="4" fill="#ffffff" />
  
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.1" />
</svg>
